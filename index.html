<!doctype html>
<!--
KINETIK MAIN SHELL STANDARD v1.0

PRODUCT:
Kinetik is a private life app for Family and Friends circles. Plans. People. Play.

MAIN TABS: 1.Today 2.Calendar 3.Ask 4.Apps 5.Me

ARCHITECTURE:
- Main shell is a single HTML file. Modular apps are separate single HTML files (App_*.html)
  in the same folder, opened full-screen in an iframe app host (mobile App-Clip pattern).
- Calendar is the source of truth (Board + Week in v1). Today is a NON-SCROLLING triage view
  (overflow opens bottom-sheet pop-ups, never page scroll).
- Ask is a deterministic command layer with PREVIEW-BEFORE-APPLY. It never silently mutates data.
- Backend: DataAPI adapter -> GoogleSheetsAdapter (Apps Script web app) by default.
- Use circleId / circleType / personId. NEVER familyId / memberId.
- Weekend is configurable (default fri-sat, Middle East). Week starts Sunday for fri-sat.
- First-build invitations: only existing accounts can be added. Email invite links = next build.

REACT/TYPESCRIPT SCALE-UP NOTE:
- State, DataAPI, EventBus, CalendarEngine, AskEngine, PermissionEngine, AppRegistry,
  AppHost(Bridge), ThemeManager, Motion and Scene map 1:1 to future TS modules.
- UI never depends on Google Sheets schema directly.

DO NOT:
- Hardcode family-only architecture. Use production password logic. Couple UI to Sheets.
-->
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Kinetik — Plans. People. Play.</title>
<meta name="theme-color" content="#eef2fb">
<link rel="manifest" href="manifest_kinetik.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kinetik">
<link rel="apple-touch-icon" href="icon_kinetik.svg">
<link rel="icon" href="icon_kinetik.svg">
<style>
/* ============ TOKENS ============ */
:root{
  --radius-xs:10px;--radius-sm:14px;--radius-md:20px;--radius-lg:28px;--radius-xl:36px;
  --font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",sans-serif;
  --dur1:.2s;--dur2:.38s;--ease:cubic-bezier(.32,.72,.28,1);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html[data-theme="dark"]{
  --bg0:#05070f;--bg1:#0a1022;--bg2:#101a36;
  --text:#eef2ff;--dim:rgba(228,234,255,.62);--faint:rgba(228,234,255,.38);
  --glass:rgba(15,22,44,.55);--glass2:rgba(20,30,58,.72);--brd:rgba(255,255,255,.1);--brd2:rgba(255,255,255,.16);
  --shadow:0 24px 80px rgba(0,0,0,.45);--chip:rgba(255,255,255,.07);
  --ok:#34d399;--warn:#fbbf24;--bad:#fb7185;
  color-scheme:dark;
}
html[data-theme="light"]{
  --bg0:#eef2fb;--bg1:#e6ecfa;--bg2:#dfe7f8;
  --text:#0d1426;--dim:rgba(16,24,48,.7);--faint:rgba(16,24,48,.48);
  --glass:rgba(255,255,255,.62);--glass2:rgba(255,255,255,.85);--brd:rgba(255,255,255,.75);--brd2:rgba(120,140,190,.25);
  --shadow:0 24px 70px rgba(53,75,120,.18);--chip:rgba(20,40,90,.06);
  --ok:#059669;--warn:#d97706;--bad:#e11d48;
  color-scheme:light;
}
/* per-circle accent set by JS */
html{--acc:#22d3ee;--acc2:#818cf8;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--font);color:var(--text);background:
  radial-gradient(120% 90% at 80% -10%,color-mix(in srgb,var(--acc) 16%,transparent),transparent 55%),
  radial-gradient(120% 100% at 0% 100%,color-mix(in srgb,var(--acc2) 13%,transparent),transparent 55%),
  linear-gradient(170deg,var(--bg1),var(--bg0) 55%,var(--bg2));
  position:fixed;inset:0;overflow:hidden;transition:background .6s;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
#bg3d{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.85}
button{font-family:var(--font);color:inherit;background:none;border:none;cursor:pointer;font-size:inherit}
input,select,textarea{font-family:var(--font);font-size:15px;color:var(--text)}
::placeholder{color:var(--faint)}
/* ============ GENERIC ============ */
.glass{background:var(--glass);backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);
  border:1px solid var(--brd);box-shadow:var(--shadow)}
.card{border-radius:var(--radius-md);padding:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:11px 20px;font-weight:600;font-size:14px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;transition:transform var(--dur1) var(--ease),opacity var(--dur1);box-shadow:0 8px 26px color-mix(in srgb,var(--acc) 35%,transparent)}
.btn:active{transform:scale(.96)}
.btn.ghost{background:var(--chip);color:var(--text);box-shadow:none;border:1px solid var(--brd2)}
.btn.danger{background:linear-gradient(135deg,#f43f5e,#fb7185)}
.btn[disabled]{opacity:.4;pointer-events:none}
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;
  background:var(--chip);border:1px solid transparent;color:var(--dim);transition:all var(--dur1);white-space:nowrap}
.chip.on{background:color-mix(in srgb,var(--acc) 18%,transparent);color:var(--text);border-color:color-mix(in srgb,var(--acc) 45%,transparent)}
.chip:active{transform:scale(.95)}
.lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.av{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;color:#fff;flex:0 0 auto;border:2px solid rgba(255,255,255,.25)}
.avs{display:flex}.avs .av{margin-left:-9px;width:28px;height:28px;font-size:10.5px}.avs .av:first-child{margin-left:0}
.row{display:flex;align-items:center;gap:10px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hide{display:none!important}
input.fld,select.fld,textarea.fld{width:100%;background:var(--chip);border:1px solid var(--brd2);border-radius:var(--radius-sm);padding:12px 14px;outline:none;transition:border-color var(--dur1)}
input.fld:focus,select.fld:focus{border-color:var(--acc)}
/* ============ SPLASH ============ */
#splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:transparent}
#splash .logo{font-size:clamp(38px,9vw,60px);font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(110deg,var(--text) 30%,var(--acc) 60%,var(--acc2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#splash .tag{font-size:14px;letter-spacing:.34em;text-transform:uppercase;color:var(--dim);font-weight:600}
#splash .pv{margin-top:18px;font-size:13.5px;color:var(--dim);padding:9px 18px;border-radius:999px;min-height:38px}
/* ============ LOGIN ============ */
#login{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;padding:22px}
#login .panel{width:100%;max-width:400px;border-radius:var(--radius-lg);padding:30px 26px;display:flex;flex-direction:column;gap:16px}
#login h1{font-size:26px;letter-spacing:-.02em}
#login .sub{color:var(--dim);font-size:13.5px;margin-top:-10px}
.persona{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:var(--radius-sm);background:var(--chip);border:1.5px solid transparent;width:100%;text-align:left;transition:all var(--dur1)}
.persona.on{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 12%,transparent)}
.persona b{font-size:15px}.persona span{display:block;font-size:12px;color:var(--dim)}
#login .priv{font-size:12px;color:var(--faint);text-align:center;line-height:1.5}
/* ============ SHELL ============ */
#shell{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;padding-top:var(--sat)}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;gap:10px}
#topbar .brand{font-weight:800;font-size:19px;letter-spacing:-.02em}
#topbar .brand i{font-style:normal;background:linear-gradient(120deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#circlePill{display:flex;align-items:center;gap:8px;border-radius:999px;padding:7px 13px 7px 9px;font-size:13px;font-weight:600;max-width:52vw}
#circlePill .dot{width:9px;height:9px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc)}
#circlePill em{font-style:normal;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#views{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;padding:4px 18px calc(96px + var(--sab));display:none;-webkit-overflow-scrolling:touch}
.view.on{display:block}
.view-inner{max-width:560px;margin:0 auto}
#view-calendar .view-inner{max-width:980px}
/* bottom nav */
#nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(12px + var(--sab));z-index:40;display:flex;gap:2px;
  border-radius:999px;padding:7px}
#nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 15px;border-radius:999px;font-size:10px;font-weight:700;color:var(--faint);transition:all var(--dur1)}
#nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#nav button.on{color:var(--text);background:color-mix(in srgb,var(--acc) 16%,transparent)}
#nav button.on svg{stroke:var(--acc)}
/* ============ TODAY (non-scroll) ============ */
#view-today{overflow:hidden!important;display:none}
#view-today.on{display:flex;flex-direction:column}
#view-today .view-inner{display:flex;flex-direction:column;gap:12px;height:100%;width:100%;max-width:560px;padding-bottom:calc(86px + var(--sab))}
.greet h2{font-size:clamp(21px,5.5vw,27px);letter-spacing:-.02em}
.greet p{color:var(--dim);font-size:13px}
.hero{border-radius:var(--radius-md);padding:17px;position:relative;overflow:hidden;border:1px solid color-mix(in srgb,var(--acc) 35%,var(--brd))}
.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,color-mix(in srgb,var(--acc) 16%,transparent),transparent 60%);pointer-events:none}
.hero .when{font-size:12px;font-weight:700;color:var(--acc)}
.hero h3{font-size:21px;margin:3px 0 2px;letter-spacing:-.01em}
.hero .meta{font-size:13px;color:var(--dim)}
.hero .prep{font-size:12.5px;color:var(--dim);margin-top:7px}
.hero .acts{display:flex;gap:8px;margin-top:12px}
.sec{border-radius:var(--radius-md);padding:13px 15px;display:flex;flex-direction:column;gap:8px;min-height:0}
.sec .hd{display:flex;justify-content:space-between;align-items:center}
.sec .more{font-size:12px;font-weight:700;color:var(--acc)}
.tl{display:flex;align-items:center;gap:11px;padding:6px 2px;font-size:14px}
.tl time{font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--dim);width:44px;flex:0 0 auto}
.tl .bar{width:3px;height:26px;border-radius:2px;flex:0 0 auto}
.tl b{font-weight:600}.tl small{display:block;font-size:11.5px;color:var(--faint)}
.tl .cf{margin-left:auto;font-size:10px;font-weight:800;color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 50%,transparent);padding:2px 7px;border-radius:99px}
.ck{display:flex;align-items:center;gap:10px;padding:5px 2px;font-size:13.5px;width:100%;text-align:left}
.ck .box{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:all var(--dur1);font-size:12px;color:#fff}
.ck.done .box{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent}
.ck.done span{text-decoration:line-through;color:var(--faint)}
.tmrw{display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius-sm);padding:11px 15px;font-size:13px;width:100%}
.tmrw b{color:var(--text)}
.allset{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;color:var(--dim);text-align:center}
.allset .big{font-size:44px}
#fab{position:fixed;right:18px;bottom:calc(86px + var(--sab));z-index:39;width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:26px;font-weight:300;box-shadow:0 12px 32px color-mix(in srgb,var(--acc) 45%,transparent);transition:transform var(--dur1) var(--ease)}
#fab:active{transform:scale(.9) rotate(90deg)}
/* ============ CALENDAR ============ */
.seg{display:flex;background:var(--chip);border-radius:999px;padding:4px;gap:2px}
.seg button{flex:1;border-radius:999px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--dim);transition:all var(--dur1)}
.seg button.on{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--acc) 35%,transparent)}
.wknav{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600}
.wknav button{width:32px;height:32px;border-radius:50%;background:var(--chip);font-size:15px}
.filters{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.boardwrap{border-radius:var(--radius-md);overflow:hidden}
.board{display:grid;width:100%}
.board .bcell{border-left:1px solid var(--brd2);border-top:1px solid var(--brd2);padding:4px;min-height:52px;display:flex;flex-direction:column;gap:4px;min-width:0}
.board .bhead{font-size:11.5px;font-weight:700;text-align:center;padding:10px 2px;color:var(--text);background:var(--glass2);display:flex;flex-direction:column;align-items:center;gap:5px;border-top:none}
.board .bday{font-size:11px;font-weight:800;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1px;color:var(--dim);border-left:none}
.board .bday.today{color:var(--acc)}
.board .bday.wknd{color:var(--warn)}
.board .bday small{font-weight:600;font-size:9.5px;letter-spacing:.04em;color:var(--faint)}
.board .wknd-row{background:color-mix(in srgb,var(--warn) 5%,transparent)}
.evchip{border-radius:8px;padding:3px 6px;font-size:10px;font-weight:600;line-height:1.25;color:var(--text);background:var(--chip);border-left:3px solid var(--acc);text-align:left;width:100%;overflow:hidden}
.evchip b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.evchip small{display:block;font-weight:500;color:var(--faint);font-size:9px;font-variant-numeric:tabular-nums}
.evchip.cf{border-left-color:var(--warn);background:color-mix(in srgb,var(--warn) 12%,transparent)}
.dayblock{border-radius:var(--radius-md);padding:13px 15px;margin-bottom:11px}
.dayblock h4{font-size:13px;display:flex;gap:8px;align-items:center;margin-bottom:7px}
.dayblock h4 .dnum{font-size:17px}
.dayblock h4 .wkb{font-size:9.5px;font-weight:800;color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 45%,transparent);border-radius:99px;padding:1px 7px}
.empty-day{font-size:12.5px;color:var(--faint);padding:3px 0}
/* ============ ASK ============ */
#view-ask.on{display:flex;flex-direction:column}
#view-ask .view-inner{display:flex;flex-direction:column;height:100%;max-width:620px;width:100%}
#askStream{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:13px;padding:6px 2px 14px;-webkit-overflow-scrolling:touch}
.orbwrap{display:flex;flex-direction:column;align-items:center;gap:13px;padding:26px 0 8px}
#orb{width:84px;height:84px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 32% 30%,color-mix(in srgb,var(--acc) 85%,#fff),var(--acc2) 70%);
  box-shadow:0 0 44px color-mix(in srgb,var(--acc) 55%,transparent),inset 0 0 22px rgba(255,255,255,.35);
  animation:breathe 4.2s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
#orb.think{animation:breathe 1.1s ease-in-out infinite}
.orbwrap p{color:var(--dim);font-size:14px}
.qps{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.msg{max-width:86%;border-radius:18px;padding:11px 15px;font-size:14.5px;line-height:1.55}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,color-mix(in srgb,var(--acc) 80%,#000 6%),var(--acc2));color:#fff;border-bottom-right-radius:6px}
.msg.kin{align-self:flex-start;border-bottom-left-radius:6px}
.msg.kin .list{margin-top:6px;display:flex;flex-direction:column;gap:5px}
.pvcard{align-self:flex-start;width:100%;max-width:380px;border-radius:var(--radius-md);padding:15px;border:1px solid color-mix(in srgb,var(--acc) 38%,var(--brd))}
.pvcard .pt{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--acc);text-transform:uppercase}
.pvcard h4{font-size:17px;margin:5px 0 2px}
.pvcard .kv{font-size:13px;color:var(--dim);display:flex;flex-direction:column;gap:2px;margin:7px 0}
.pvcard .acts{display:flex;gap:8px;margin-top:11px}
#view-ask{padding-bottom:0}
#composer{display:flex;gap:9px;align-items:flex-end;padding:10px 0 calc(82px + var(--sab))}
#askHead{display:flex;justify-content:flex-end;padding:4px 0 2px;min-height:34px}
#askClear{font-size:12px;font-weight:700;color:var(--dim);background:var(--chip);border-radius:99px;padding:6px 14px;border:1px solid var(--brd2)}
.askcard{align-self:flex-start;width:100%;max-width:430px;border-radius:var(--radius-md);padding:14px 16px;display:flex;flex-direction:column;gap:5px}
.askcard .ah{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin-bottom:3px}
.askcard .arow{display:flex;align-items:center;gap:10px;font-size:13.5px;padding:4px 0}
.askcard .arow time{width:56px;font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;flex:0 0 auto}
.askcard .arow .bar{width:3px;height:22px;border-radius:2px;flex:0 0 auto}
.askcard .arow .sub{color:var(--dim);font-size:12px}
.askcard .dh{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:7px}
#askInput{flex:1;resize:none;max-height:110px;background:var(--glass2);border:1px solid var(--brd);border-radius:24px;padding:13px 17px;outline:none;backdrop-filter:blur(18px)}
#askSend{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:all var(--dur1)}
#askSend[disabled]{opacity:.35}
#askSend svg{width:19px;height:19px;fill:#fff}
/* ============ APPS ============ */
.appgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:6px 2px}
.appico{display:flex;flex-direction:column;align-items:center;gap:7px;transition:transform var(--dur1) var(--ease)}
.appico:active{transform:scale(.9)}
.appico .ic{width:100%;aspect-ratio:1;max-width:74px;border-radius:26%;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 10px 26px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.35)}
.appico span{font-size:11px;font-weight:600;color:var(--text);opacity:.85;text-align:center}
.feat{border-radius:var(--radius-lg);position:relative;overflow:hidden;padding:22px 20px;display:flex;flex-direction:column;gap:6px;color:#fff;margin-bottom:16px;box-shadow:var(--shadow)}
.feat .k{font-size:10px;font-weight:800;letter-spacing:.16em;opacity:.85}
.feat h3{font-size:23px;letter-spacing:-.02em}
.feat p{font-size:13px;opacity:.92}
.feat .fr{display:flex;align-items:center;gap:13px;margin-top:10px}
.feat .ic{width:52px;height:52px;border-radius:24%;background:rgba(255,255,255,.24);display:flex;align-items:center;justify-content:center;font-size:25px;backdrop-filter:blur(6px)}
.strow{display:flex;gap:13px;align-items:center;padding:13px 0;border-bottom:1px solid var(--brd2)}
.strow:last-child{border-bottom:none}
.strow .ic{width:54px;height:54px;border-radius:24%;display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto;box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 6px 18px rgba(0,0,0,.14)}
.strow b{font-size:15px}.strow p{font-size:12px;color:var(--dim)}
.strow .rm{font-size:11px;color:var(--faint);font-weight:600;padding:2px 0;text-align:left}
.getbtn{margin-left:auto;flex:0 0 auto;border-radius:999px;padding:7px 20px;font-size:13px;font-weight:800;letter-spacing:.03em;background:color-mix(in srgb,var(--acc) 14%,transparent);color:var(--acc);transition:all var(--dur1)}
.getbtn:active{transform:scale(.94)}
.getbtn.soon{opacity:.45;pointer-events:none}
/* app host */
#appHost{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;background:var(--bg0)}
#appHost.on{display:flex}
#appHostBar{display:flex;align-items:center;justify-content:space-between;padding:calc(10px + var(--sat)) 16px 10px;background:var(--glass2);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd2)}
#appHostBar b{font-size:15px}
#appFrame{flex:1;border:none;width:100%;background:transparent}
/* ============ ME ============ */
.me-prof{display:flex;align-items:center;gap:15px;border-radius:var(--radius-md);padding:18px;margin-bottom:13px}
.me-prof .av{width:54px;height:54px;font-size:19px}
.me-prof b{font-size:18px}.me-prof span{display:block;font-size:12.5px;color:var(--dim)}
.me-sec{border-radius:var(--radius-md);padding:6px 15px;margin-bottom:13px}
.me-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--brd2);font-size:14.5px;width:100%;text-align:left}
.me-row:last-child{border-bottom:none}
.me-row .end{margin-left:auto;color:var(--dim);font-size:13px;display:flex;align-items:center;gap:7px}
.me-row select{background:var(--chip);border:1px solid var(--brd2);border-radius:10px;padding:6px 10px;font-size:13px;outline:none}
.rolechip{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:99px;background:var(--chip);color:var(--dim)}
#logoutBtn{width:100%;margin:4px 0 26px;padding:14px;border-radius:var(--radius-sm);font-weight:700;color:var(--bad);background:color-mix(in srgb,var(--bad) 9%,transparent);border:1px solid color-mix(in srgb,var(--bad) 25%,transparent)}
/* ============ SHEETS & TOAST ============ */
#sheetLayer{position:fixed;inset:0;z-index:80;display:none}
#sheetLayer.on{display:block}
#scrim{position:absolute;inset:0;background:rgba(4,7,16,.45);backdrop-filter:blur(3px)}
#sheet{position:absolute;left:0;right:0;bottom:0;max-height:84%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:10px 20px calc(22px + var(--sab));display:flex;flex-direction:column}
#sheet .grab{width:42px;height:5px;border-radius:3px;background:var(--brd2);margin:4px auto 13px;flex:0 0 auto}
#sheet h3{font-size:18px;margin-bottom:13px;flex:0 0 auto;letter-spacing:-.01em}
#sheetBody{overflow-y:auto;display:flex;flex-direction:column;gap:11px;-webkit-overflow-scrolling:touch}
@media(min-width:768px){
  #sheet{left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-50%);width:460px;border-radius:var(--radius-lg);max-height:78%}
  #sheet .grab{display:none}
}
#toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(92px + var(--sab));z-index:95;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{border-radius:999px;padding:11px 20px;font-size:13.5px;font-weight:600;animation:tpop .3s var(--ease)}
@keyframes tpop{from{opacity:0;transform:translateY(12px) scale(.92)}to{opacity:1}}
/* circle switcher cards */
.ccard{width:100%;text-align:left;border-radius:var(--radius-md);padding:15px;display:flex;flex-direction:column;gap:8px;border:1.5px solid var(--brd2);background:var(--chip);transition:all var(--dur1)}
.ccard.on{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 10%,transparent)}
.ccard .tb{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:99px;background:color-mix(in srgb,var(--acc) 18%,transparent);color:var(--acc)}
.ccard .nx{font-size:12.5px;color:var(--dim)}
/* desktop */
@media(min-width:900px){
  .view{padding-left:32px;padding-right:32px}
  .appgrid{grid-template-columns:repeat(6,1fr)}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script>
/* =================================================================
   KINETIK SHELL — modules map 1:1 to future React/TS modules
================================================================= */
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const uid=p=>(p||"id")+"_"+Math.random().toString(36).slice(2,9);
const pad=n=>String(n).padStart(2,"0");
const iso=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const mins=t=>{const[a,b]=String(t).split(":");return(+a)*60+(+b||0);};
const fmtT=t=>{let[h,m]=String(t).split(":").map(Number);const ap=h>=12?"PM":"AM";h=h%12||12;return h+(m?":"+pad(m):"")+" "+ap.toLowerCase();};
const DOW=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DOWS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

/* ---------------- EventBus ---------------- */
const EventBus={l:{},on(e,f){(this.l[e]=this.l[e]||[]).push(f);},emit(e,p){(this.l[e]||[]).forEach(f=>{try{f(p)}catch(x){console.warn(x)}});}};

/* ---------------- Live data shape ---------------- */
/* ---------------- DB + DataAPI (Google Sheets live adapter) ---------------- */
const LIVE_API_URL="https://script.google.com/macros/s/AKfycbxGyBDoHifn2JV98I6D5HSPrjLnZIt-6wa8GWUuVPlNNR41k-d7CCwymCUiWWlwyTlW/exec";
const DEFAULT_SETTINGS={theme:"light",weekendDays:"fri-sat",backendMode:"sheets",apiUrl:LIVE_API_URL};
const SHEET_COLLECTIONS={
  users:"Users",people:"People",circles:"Circles",circleMembers:"CircleMembers",
  routines:"Calendar_Routines",events:"Calendar_Events",exceptions:"Calendar_Exceptions",
  appCatalog:"AppCatalog",circleApps:"CircleApps",appRecords:"AppRecords"
};
const BUILTIN_APP_CATALOG=[
  {id:"padel-americano",name:"Padel Americano",file:"App_PadelAmericano.html",glyph:"🎾",gradient:["#0ea5e9","#22d3ee"],tagline:"Fair rounds. Real leaderboards.",status:"live",allowed:["family","friends"],active:true},
  {id:"event-poll",name:"Event Poll",file:"App_EventPoll.html",glyph:"🗳️",gradient:["#8b5cf6","#d946ef"],tagline:"Find the best time, fast.",status:"live",allowed:["family","friends"],active:true},
  {id:"times-quest",name:"Times Quest",file:"",glyph:"×",gradient:["#f59e0b","#f97316"],tagline:"Multiplication, mastered.",status:"soon",allowed:["family"],active:true},
  {id:"grocery",name:"Grocery",file:"",glyph:"🛒",gradient:["#10b981","#34d399"],tagline:"Shared family shopping.",status:"soon",allowed:["family","friends"],active:true}
];
const EMPTY_DATA=()=>({
  users:[],people:[],circles:[],circleMembers:[],routines:[],events:[],exceptions:[],
  appCatalog:[],circleApps:[],appRecords:[],prepState:{},settings:{...DEFAULT_SETTINGS}
});
const boolVal=v=>v===true||String(v).toLowerCase()==="true";
const jsonVal=(v,f)=>{if(Array.isArray(v)||v&&typeof v==="object")return v;if(v===""||v==null)return f;try{return JSON.parse(v)}catch(e){return f}};
const dayVal=v=>{
  const days={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
  if(typeof v==="number")return v;
  const s=String(v||"").trim().toLowerCase();
  return days[s]??(+s||0);
};
const splitGradient=v=>{
  if(Array.isArray(v))return v;
  const s=String(v||"").trim();
  const hex=s.match(/#[0-9a-f]{3,8}/ig);
  if(hex&&hex.length)return [hex[0],hex[1]||hex[0]];
  return ["#6366f1","#22d3ee"];
};
const appGlyph=a=>({store:"◎","padel-americano":"🎾","event-poll":"🗳️",times:"×",grocery:"🛒"}[a.id]||"✦");
const activeRow=r=>r.active===undefined||r.active===""||boolVal(r.active);
function fromSheet(col,row){
  const r={...row};
  if(col==="users")return {...r,personId:r.personId||r.defaultPersonId,pin:String(r.pin??r.passwordDemo??"").trim()};
  if(col==="circles")return {...r,accent:r.accent||splitGradient(r.color),active:activeRow(r)};
  if(col==="routines")return {...r,participantPersonIds:jsonVal(r.participantPersonIdsJson,r.participantPersonIds||[]),dayOfWeek:dayVal(r.dayOfWeek),preparation:jsonVal(r.preparationJson,r.preparation||[]),active:activeRow(r)};
  if(col==="events")return {...r,participantPersonIds:jsonVal(r.participantPersonIdsJson,r.participantPersonIds||[]),preparation:jsonVal(r.preparationJson,r.preparation||[]),active:activeRow(r)};
  if(col==="appCatalog")return {...r,glyph:r.glyph||appGlyph(r),gradient:splitGradient(r.gradient),allowed:jsonVal(r.allowedCircleTypesJson,r.allowed||["family","friends"]),status:r.status==="active"?"live":(r.status||"live"),active:activeRow(r)};
  if(col==="circleApps")return {...r,installed:boolVal(r.installed),pinned:boolVal(r.pinned)};
  if(col==="appRecords")return {...r,payload:jsonVal(r.payloadJson,r.payload||{}),deleted:boolVal(r.deleted)};
  if(col==="circleMembers")return {...r,userId:r.userId||null,active:activeRow(r)};
  return r;
}
function toSheet(col,row){
  const r={...row};
  if(col==="users"){r.defaultPersonId=r.defaultPersonId||r.personId;r.passwordDemo=r.passwordDemo||r.pin;delete r.personId;delete r.pin;}
  if(col==="circles"){r.color=r.color||(r.accent&&r.accent[0]);delete r.accent;}
  if(col==="routines"||col==="events"){r.participantPersonIdsJson=JSON.stringify(r.participantPersonIds||[]);r.preparationJson=JSON.stringify(r.preparation||[]);delete r.participantPersonIds;delete r.preparation;}
  if(col==="appCatalog"){r.gradient=Array.isArray(r.gradient)?`linear-gradient(135deg,${r.gradient[0]},${r.gradient[1]||r.gradient[0]})`:r.gradient;r.allowedCircleTypesJson=JSON.stringify(r.allowed||["family","friends"]);delete r.glyph;delete r.allowed;}
  if(col==="appRecords"){r.payloadJson=JSON.stringify(r.payload||{});delete r.payload;}
  return r;
}
const SheetsAPI={
  async request(action,col,body={}){
    const collection=SHEET_COLLECTIONS[col];
    if(!collection)throw new Error("Unknown collection: "+col);
    const payload={action,collection,userId:S.userId||"",circleId:S.circleId||body.circleId||body.payload?.circleId||"",...body};
    const res=await fetch(LIVE_API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
    const json=await res.json();
    if(!json.ok)throw new Error(json.error||"Sheets request failed");
    return json.data??json.items??json.item??json.record??null;
  },
  async list(col){const items=await this.request("list",col);return (items||[]).map(x=>fromSheet(col,x));},
  async loadAll(){
    const out=EMPTY_DATA();
    await Promise.all(Object.keys(SHEET_COLLECTIONS).map(async col=>{out[col]=await this.list(col);}));
    if(!out.appCatalog.length)out.appCatalog=BUILTIN_APP_CATALOG.map(a=>({...a,gradient:[...a.gradient],allowed:[...a.allowed]}));
    out.settings={...DEFAULT_SETTINGS};
    return out;
  }
};
const DB={KEY:"kinetik_live_cache_v1",d:null,error:null,
  async load(){
    let cached=null;try{cached=JSON.parse(localStorage.getItem(this.KEY))}catch(e){}
    this.d=cached&&cached.settings?cached:EMPTY_DATA();
    try{this.d=await SheetsAPI.loadAll();this.error=null;this.save();}
    catch(e){this.error=e.message||String(e);console.error(e);if(!cached)this.d=EMPTY_DATA();}
  },
  save(){localStorage.setItem(this.KEY,JSON.stringify(this.d));},
  async refresh(){await this.load();},
  clearCache(){localStorage.removeItem(this.KEY);this.d=EMPTY_DATA();}
};
const DataAPI={
  list(col,f){let a=DB.d[col]||[];if(f)a=a.filter(r=>Object.keys(f).every(k=>r[k]===f[k]));return a;},
  get(col,id){return (DB.d[col]||[]).find(r=>r.id===id);},
  create(col,p){p.id=p.id||uid(col.slice(0,2));p.createdAt=p.createdAt||new Date().toISOString();(DB.d[col]=DB.d[col]||[]).push(p);DB.save();SyncEngine.queue(col,"create",p);return p;},
  async createLive(col,p){
    const local={...p,id:p.id||uid(col.slice(0,2)),createdAt:p.createdAt||new Date().toISOString()};
    const result=await SheetsAPI.request("create",col,{id:local.id,payload:toSheet(col,local)});
    const saved=fromSheet(col,Array.isArray(result)?result[0]:result)||local;
    const row={...local,...saved};
    (DB.d[col]=DB.d[col]||[]).push(row);DB.save();
    return row;
  },
  update(col,id,p){const r=this.get(col,id);if(r){Object.assign(r,p,{updatedAt:new Date().toISOString()});DB.save();SyncEngine.queue(col,"update",r);}return r;},
  remove(col,id){DB.d[col]=(DB.d[col]||[]).filter(r=>r.id!==id);DB.save();SyncEngine.queue(col,"remove",{id});}
};
const SyncEngine={status:"idle",
  queue(col,op,payload){
    if(!SHEET_COLLECTIONS[col])return;
    this.status="syncing";EventBus.emit("backend:syncStarted");
    const body=op==="remove"?{id:payload.id}:{id:payload.id,payload:toSheet(col,payload)};
    SheetsAPI.request(op,col,body)
      .then(()=>{this.status="synced";EventBus.emit("backend:syncFinished");})
      .catch(e=>{this.status="failed";EventBus.emit("backend:syncFailed");Toast.show("Live sync failed — cached locally");console.error(e);});
  }
};

/* ---------------- State + Session ---------------- */
const S={userId:null,personId:null,circleId:null,tab:"today",calMode:"board",calWeekOffset:0,calFilter:"all",askStarted:false};
const Session={KEY:"kinetik_session",
  save(){localStorage.setItem(this.KEY,JSON.stringify({userId:S.userId,personId:S.personId,circleId:S.circleId}));},
  restore(){try{const s=JSON.parse(localStorage.getItem(this.KEY));if(s&&s.userId&&DataAPI.get("users",s.userId)&&DataAPI.get("people",s.personId)&&DataAPI.get("circles",s.circleId)){Object.assign(S,s);return true;}}catch(e){}return false;},
  clear(){localStorage.removeItem(this.KEY);}
};

/* ---------------- PermissionEngine / CircleAccessGuard ---------------- */
const Perm={
  allowedCircleIds(userId){return DB.d.circleMembers.filter(m=>m.userId===userId).map(m=>m.circleId);},
  role(userId,circleId){const m=DB.d.circleMembers.find(m=>m.userId===userId&&m.circleId===circleId);return m?m.role:null;},
  canEditCalendar(userId,circleId){return["owner","admin","adult","member"].includes(this.role(userId,circleId));}
};

/* ---------------- CalendarEngine ---------------- */
const Cal={
  weekStartDow(){return DB.d.settings.weekendDays==="fri-sat"?0:1;},
  isWeekend(dow){return DB.d.settings.weekendDays==="fri-sat"?(dow===5||dow===6):(dow===0||dow===6);},
  startOfWeek(d){const dow=d.getDay();return addDays(d,-((dow-this.weekStartDow()+7)%7));},
  exceptionsFor(circleId,dateIso){return DataAPI.list("exceptions",{circleId}).filter(x=>x.date===dateIso);},
  instancesForDate(circleId,d){
    const dateIso=iso(d),dow=d.getDay(),exc=this.exceptionsFor(circleId,dateIso),out=[];
    DataAPI.list("routines",{circleId}).forEach(r=>{
      if(!r.active||r.dayOfWeek!==dow)return;
      const ex=exc.find(x=>x.routineId===r.id);
      if(ex&&ex.action==="cancelled")return;
      out.push({key:r.id+"_"+dateIso,routineId:r.id,title:r.title,start:r.startTime,end:r.endTime,
        participants:r.participantPersonIds||[],coach:r.teacherCoach,prep:r.preparation||[],category:r.category,recurring:true,date:dateIso});
    });
    DataAPI.list("events",{circleId}).forEach(e=>{
      if(e.date!==dateIso)return;
      out.push({key:e.id,eventId:e.id,title:e.title,start:e.startTime,end:e.endTime,
        participants:e.participantPersonIds||[],coach:"",prep:e.preparation||[],category:e.category||"event",recurring:false,date:dateIso});
    });
    out.sort((a,b)=>mins(a.start)-mins(b.start));
    /* conflict detection: same participant, overlapping time */
    for(let i=0;i<out.length;i++)for(let j=i+1;j<out.length;j++){
      const a=out[i],b=out[j];
      if(mins(b.start)<mins(a.end)&&mins(a.start)<mins(b.end)&&a.participants.some(p=>b.participants.includes(p))){a.conflict=b.conflict=true;}
    }
    return out;
  },
  agendaToday(circleId){return this.instancesForDate(circleId,new Date());},
  week(circleId,offset){
    const start=this.startOfWeek(addDays(new Date(),(offset||0)*7)),days=[];
    for(let i=0;i<7;i++){const d=addDays(start,i);days.push({date:d,iso:iso(d),dow:d.getDay(),items:this.instancesForDate(circleId,d)});}
    return days;
  },
  prepKey(it,item){return it.date+"|"+(it.routineId||it.eventId)+"|"+item;},
  prepItems(circleId,d){
    const out=[];this.instancesForDate(circleId,d).forEach(it=>{(it.prep||[]).forEach(p=>{
      out.push({key:this.prepKey(it,p),label:p,who:it.participants[0],evt:it.title,done:!!DB.d.prepState[this.prepKey(it,p)]});});});
    return out;
  },
  togglePrep(key){DB.d.prepState[key]=!DB.d.prepState[key];DB.save();}
};

/* ---------------- helpers ---------------- */
const personName=id=>{const p=DataAPI.get("people",id);return p?p.displayName:"";};
const personColor=id=>{const p=DataAPI.get("people",id);return p?p.color:"#64748b";};
const avHtml=(id,cls)=>{const p=DataAPI.get("people",id);return p?`<span class="av ${cls||""}" style="background:${p.color}">${esc(p.displayName[0])}</span>`:"";};
const circle=()=>DataAPI.get("circles",S.circleId);
const circlePeople=cid=>DB.d.circleMembers.filter(m=>m.circleId===(cid||S.circleId)).map(m=>DataAPI.get("people",m.personId)).filter(Boolean);
const me=()=>DataAPI.get("people",S.personId);

/* ---------------- ThemeManager ---------------- */
const Theme={
  apply(){
    let t=DB.d.settings.theme;
    if(t==="auto")t=matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";
    document.documentElement.dataset.theme=t;
    const c=circle();
    if(c&&c.accent){document.documentElement.style.setProperty("--acc",c.accent[0]);document.documentElement.style.setProperty("--acc2",c.accent[1]);}
    const mt=document.querySelector('meta[name="theme-color"]');if(mt)mt.content=t==="light"?"#eef2fb":"#070b16";
    Scene.retheme();
  }
};

const Toast={show(msg){const t=document.createElement("div");t.className="toast glass";t.textContent=msg;$("#toasts").appendChild(t);setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .4s";setTimeout(()=>t.remove(),420);},2300);}};

/* ---------------- Motion (GSAP guarded) ---------------- */
const Motion={
  ok(){return typeof gsap!=="undefined"&&!matchMedia("(prefers-reduced-motion: reduce)").matches;},
  reveal(el,d){if(this.ok())gsap.fromTo(el,{y:14,opacity:0},{y:0,opacity:1,duration:.38,delay:d||0,ease:"power3.out"});},
  stagger(sel){if(this.ok())gsap.fromTo(sel,{y:16,opacity:0},{y:0,opacity:1,duration:.4,stagger:.05,ease:"power3.out"});}
};

/* ---------------- Scene (Three.js guarded starfield) ---------------- */
const Scene={r:null,pts:null,
  init(){
    if(typeof THREE==="undefined")return;
    try{
      const cv=$("#bg3d");this.r=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:false});
      this.r.setPixelRatio(Math.min(devicePixelRatio,1.6));
      this.scene=new THREE.Scene();this.cam=new THREE.PerspectiveCamera(60,1,.1,100);this.cam.position.z=8;
      const n=innerWidth<700?320:650,pos=new Float32Array(n*3);
      for(let i=0;i<n*3;i++)pos[i]=(Math.random()-.5)*22;
      const g=new THREE.BufferGeometry();g.setAttribute("position",new THREE.BufferAttribute(pos,3));
      this.mat=new THREE.PointsMaterial({size:.05,transparent:true,opacity:.7});
      this.pts=new THREE.Points(g,this.mat);this.scene.add(this.pts);
      this.resize();addEventListener("resize",()=>this.resize());
      this.retheme();
      const anim=()=>{if(document.hidden){requestAnimationFrame(anim);return;}
        this.pts.rotation.y+=.0006;this.pts.rotation.x+=.00022;this.r.render(this.scene,this.cam);requestAnimationFrame(anim);};
      if(!matchMedia("(prefers-reduced-motion: reduce)").matches)anim();else this.r.render(this.scene,this.cam);
    }catch(e){console.warn("scene off",e);}
  },
  resize(){if(!this.r)return;this.r.setSize(innerWidth,innerHeight);this.cam.aspect=innerWidth/innerHeight;this.cam.updateProjectionMatrix();},
  retheme(){if(!this.mat)return;const light=document.documentElement.dataset.theme==="light";
    this.mat.color=new THREE.Color(light?"#7c9cf5":"#9ad7f5");this.mat.opacity=light?.45:.7;}
};

const Ask={
  hello(){
    const stream=$("#askStream");stream.innerHTML=`

    <div class="qps">${this.prompts().map(q=>`<button class="chip" onclick="Ask.send('${q.replace(/'/g,"\\'")}')">${esc(q)}</button>`).join("")}</div></div>`;
  },
  prompts(){
    return circle().type==="family"
      ?["What do we have today?","What's tomorrow?","What needs preparation?","Show Baginda this week","Add Kinara padel every Tuesday at 8am"]
      :["What's tomorrow?","Open Padel","Start an event poll","Who is free this weekend?"];
  },
  send(text){
    text=text.trim();if(!text)return;
    S.askStarted=true;$("#askClear").classList.remove("hide");
    const stream=$("#askStream");
    if(stream.querySelector(".orbwrap")&&stream.children.length===1)stream.innerHTML='<div class="orbwrap" style="padding:8px 0"><div id="orb" style="width:40px;height:40px"></div></div>';
    stream.insertAdjacentHTML("beforeend",`<div class="msg user">${esc(text)}</div>`);
    $("#askInput").value="";$("#askSend").disabled=true;
    const orb=$("#orb");if(orb)orb.classList.add("think");
    setTimeout(()=>{if(orb)orb.classList.remove("think");this.respond(text);stream.scrollTop=stream.scrollHeight;},480);
    stream.scrollTop=stream.scrollHeight;
  },
  respond(text){
    const t=text.toLowerCase(),stream=$("#askStream");
    const add=h=>{stream.insertAdjacentHTML("beforeend",h);stream.scrollTop=stream.scrollHeight;};
    const ppl=circlePeople();
    const findPerson=()=>ppl.find(p=>t.includes(p.displayName.toLowerCase()));
    /* add routine: "add kinara padel every tuesday at 8am" */
    let m=t.match(/add\s+(\w+)\s+(.+?)\s+every\s+(sun|mon|tue|wed|thu|fri|sat)\w*\s+at\s+([\d:.]+\s*(?:am|pm)?)/i);
    if(m){
      const person=ppl.find(p=>p.displayName.toLowerCase()===m[1]),title=m[2].replace(/\b\w/g,c=>c.toUpperCase()),
        dow=["sun","mon","tue","wed","thu","fri","sat"].indexOf(m[3]),time=parseTime(m[4]);
      if(person&&dow>=0&&time){
        const end=pad(Math.min(23,+time.split(":")[0]+1))+":"+time.split(":")[1];
        const pid="pv_"+Date.now();
        add(`<div class="pvcard glass" id="${pid}"><div class="pt">Proposed routine · preview</div>
        <h4>${esc(person.displayName)} ${esc(title)}</h4>
        <div class="kv"><span>Every ${DOW[dow]}</span><span>${fmtT(time)} – ${fmtT(end)}</span><span>Circle: ${esc(circle().name)}</span><span>Responsible: ${esc(me().displayName)}</span></div>
        <div class="acts"><button class="btn" data-a="ok">Add to Calendar</button><button class="btn ghost" data-a="no">Cancel</button></div></div>`);
        const card=document.getElementById(pid);
        card.querySelector('[data-a="ok"]').onclick=()=>{
          DataAPI.create("routines",{circleId:S.circleId,title,participantPersonIds:[person.id],responsiblePersonId:S.personId,dayOfWeek:dow,startTime:time,endTime:end,category:"activity",teacherCoach:"",preparation:[],active:true});
          card.querySelector(".acts").innerHTML='<span style="color:var(--ok);font-weight:700;font-size:13.5px">✓ Added to Calendar</span>';
          EventBus.emit("calendar:routineCreated");Toast.show("Routine added ✓");
        };
        card.querySelector('[data-a="no"]').onclick=()=>{card.querySelector(".acts").innerHTML='<span style="color:var(--faint);font-size:13px">Cancelled</span>';};
        return;
      }
    }
    if(/tomorrow/.test(t))return add(this.summaryCard("Tomorrow",Cal.instancesForDate(S.circleId,addDays(new Date(),1))));
    if(/today|we have/.test(t))return add(this.summaryCard("Today",Cal.agendaToday(S.circleId)));
    if(/prep/.test(t)){
      const ps=Cal.prepItems(S.circleId,new Date()).filter(p=>!p.done);
      if(!ps.length)return add('<div class="msg kin glass">Everything is prepared ✓</div>');
      return add(`<div class="askcard glass"><span class="ah">Still to prepare · ${ps.length}</span>
      ${ps.map(p=>`<div class="arow"><span class="bar" style="background:${personColor(p.who)}"></span><span><b>${esc(p.label)}</b> <span class="sub">${esc(personName(p.who))} · ${esc(p.evt)}</span></span></div>`).join("")}</div>`);
    }
    const sp=t.match(/show\s+(\w+)/);
    if(sp){
      const person=ppl.find(p=>p.displayName.toLowerCase()===sp[1]);
      if(person){
        const wk=Cal.week(S.circleId,0);
        let rows="";wk.forEach(d=>{
          const its=d.items.filter(i=>i.participants.includes(person.id));
          if(its.length){rows+=`<div class="dh">${DOW[d.dow]}</div>`+its.map(i=>`<div class="arow"><time>${fmtT(i.start)}</time><span class="bar" style="background:${person.color}"></span><span><b>${esc(i.title)}</b>${i.coach?` <span class="sub">${esc(i.coach)}</span>`:""}</span></div>`).join("");}
        });
        return add(`<div class="askcard glass"><span class="ah">${esc(person.displayName)} · this week</span>${rows||'<div class="empty-day">Nothing scheduled.</div>'}</div>`);
      }
    }
    if(/open\s+(padel|americano)/.test(t)){add('<div class="msg kin glass">Opening <b>Padel Americano</b>…</div>');return setTimeout(()=>AppHost.open("padel-americano"),500);}
    if(/poll|who is free|free /.test(t)){add('<div class="msg kin glass">Let\'s find the best time — opening <b>Event Poll</b> 🗳️</div>');return setTimeout(()=>AppHost.open("event-poll"),500);}
    add(`<div class="msg kin glass">I can help with your circle's plans. Try:<div class="list">${this.prompts().map(p=>"· "+esc(p)).join("<br>")}</div></div>`);
  },
  summaryCard(label,items){
    if(!items.length)return `<div class="msg kin glass"><b>${label}:</b> nothing scheduled 🎉</div>`;
    return `<div class="askcard glass"><span class="ah">${label} · ${esc(circle().name)}</span>
    ${items.map(i=>`<div class="arow"><time>${fmtT(i.start)}</time><span class="bar" style="background:${personColor(i.participants[0])}"></span>
    <span><b>${esc(i.title)}</b> <span class="sub">${i.participants.map(personName).map(esc).join(", ")}</span>${i.conflict?' <span style="color:var(--warn);font-size:11px;font-weight:800">⚠ CLASH</span>':""}</span></div>`).join("")}</div>`;
  }
};
function parseTime(s){
  const m=String(s).trim().match(/(\d{1,2})(?:[:.](\d{2}))?\s*(am|pm)?/i);if(!m)return null;
  let h=+m[1];const mn=m[2]||"00";
  if(m[3]){if(/pm/i.test(m[3])&&h<12)h+=12;if(/am/i.test(m[3])&&h===12)h=0;}
  return pad(h)+":"+mn;
}

window.storeGet=appId=>{

};

window.storeRm=appId=>{

/* ---------------- App Host + Bridge ---------------- */
const AppHost={cur:null,
  open(appId){
    const app=DataAPI.get("appCatalog",appId);
    if(!app||!app.file)return Toast.show("Coming soon");
    this.cur=app;
    $("#appHostTitle").textContent=app.name;
    $("#appFrame").src=app.file;
    $("#appHost").classList.add("on");
    if(Motion.ok())gsap.fromTo("#appHost",{y:30,opacity:0},{y:0,opacity:1,duration:.42,ease:"power3.out"});
  },
  close(){$("#appHost").classList.remove("on");$("#appFrame").src="about:blank";this.cur=null;renderAll();},
  init(){
    $("#appHostDone").onclick=()=>this.close();
    $("#appFrame").addEventListener("load",()=>{
      if(!this.cur)return;
      $("#appFrame").contentWindow.postMessage({type:"INIT_APP",payload:{
        circleId:S.circleId,circleType:circle().type,personId:S.personId,role:Perm.role(S.userId,S.circleId),
        theme:document.documentElement.dataset.theme,appId:this.cur.id,backendMode:DB.d.settings.backendMode,apiUrl:DB.d.settings.apiUrl,
        people:circlePeople().map(p=>({id:p.id,name:p.displayName,color:p.color}))
      }},"*");
    });
    addEventListener("message",e=>{
      const m=e.data||{};const reply=p=>{try{$("#appFrame").contentWindow.postMessage(p,"*")}catch(x){}};
      if(m.type==="DATA_LIST"){const items=DataAPI.list("appRecords").filter(r=>r.circleId===S.circleId&&r.appId===m.appId&&r.collection===m.collection&&!r.deleted);reply({type:"DATA_RESULT",reqId:m.reqId,items});}
      else if(m.type==="DATA_CREATE"){const r=DataAPI.create("appRecords",{circleId:S.circleId,appId:m.appId,collection:m.collection,payload:m.payload,deleted:false});reply({type:"DATA_RESULT",reqId:m.reqId,items:[r]});}
      else if(m.type==="DATA_UPDATE"){const r=DataAPI.update("appRecords",m.id,{payload:m.payload});reply({type:"DATA_RESULT",reqId:m.reqId,items:[r]});}
      else if(m.type==="DATA_REMOVE"){DataAPI.update("appRecords",m.id,{deleted:true});reply({type:"DATA_RESULT",reqId:m.reqId,items:[]});}
      else if(m.type==="SHOW_TOAST")Toast.show(m.message||"");
      else if(m.type==="CLOSE_APP")this.close();
      else if(m.type==="ADD_TO_CALENDAR"){
        DataAPI.create("events",{circleId:S.circleId,title:m.payload.title,date:m.payload.date,startTime:m.payload.startTime,endTime:m.payload.endTime,participantPersonIds:m.payload.participantPersonIds||[S.personId],category:"event",preparation:m.payload.preparation||[]});
        Toast.show("Added to Calendar ✓");EventBus.emit("calendar:eventCreated");
      }
    });
  }
};

/* ---------------- LOGIN + SPLASH ---------------- */
const userSlug=name=>String(name||"user").trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,32)||"user";
function finishLogin(user){
  S.userId=user.id;S.personId=user.personId;
  S.circleId=Perm.allowedCircleIds(user.id)[0];
  Session.save();EventBus.emit("auth:login");
  $("#login").classList.add("hide");enterShell();
}
function showSignup(list){
  $("#pinFld").value="";
  $("#pinFld").placeholder="Choose PIN (4-6 digits)";
  $("#loginBtn").textContent="Create account";
  $("#loginBtn").disabled=false;
  list.innerHTML=`
    <p style="font-size:13.5px;color:var(--faint);line-height:1.45;margin:0">No live users exist yet. Create the first account and circle.</p>
    <input class="fld" id="suName" placeholder="Your name" autocomplete="name">
    <input class="fld" id="suEmail" type="email" placeholder="Email (optional)" autocomplete="email">
    <input class="fld" id="suCircle" placeholder="First circle name" value="My Family">`;
  $("#loginBtn").onclick=async()=>{
    const name=$("#suName").value.trim();
    const email=$("#suEmail").value.trim();
    const circleName=$("#suCircle").value.trim()||"My Family";
    const pin=$("#pinFld").value.trim();
    if(!name)return Toast.show("Add your name first");
    if(!/^\d{4,6}$/.test(pin))return Toast.show("PIN must be 4-6 digits");
    $("#loginBtn").disabled=true;$("#loginBtn").textContent="Creating...";
    try{
      const now=new Date().toISOString();
      const color="#6366f1";
      const person=await DataAPI.createLive("people",{id:uid("person"),displayName:name,avatar:name[0].toUpperCase(),color,createdAt:now,updatedAt:now,active:true});
      const user=await DataAPI.createLive("users",{id:uid("user"),username:userSlug(name),displayName:name,email,passwordDemo:pin,avatar:name[0].toUpperCase(),defaultPersonId:person.id,createdAt:now,updatedAt:now,active:true});
      const circle=await DataAPI.createLive("circles",{id:uid("circle"),name:circleName,type:"family",ownerUserId:user.id,icon:"family",color,description:"",createdAt:now,updatedAt:now,active:true});
      await DataAPI.createLive("circleMembers",{id:uid("member"),circleId:circle.id,personId:person.id,userId:user.id,role:"owner",permission:"full_control",joinedAt:now,active:true});
      const liveUser={...user,personId:person.id,pin};
      Toast.show("Account created");
      finishLogin(liveUser);
    }catch(e){
      console.error(e);Toast.show("Signup failed — check Apps Script access");
      $("#loginBtn").disabled=false;$("#loginBtn").textContent="Create account";
    }
  };
  Motion.reveal("#login .panel");
}
function showLogin(){
  $("#login").classList.remove("hide");
  const list=$("#personaList");list.innerHTML="";
  let sel=null;
  if(!DB.d.users.length){
    showSignup(list);
    return;
  }
  $("#pinFld").placeholder="PIN";
  $("#loginBtn").textContent="Continue";
  $("#loginBtn").disabled=true;
  DB.d.users.forEach(u=>{
    const cids=Perm.allowedCircleIds(u.id);
    const b=document.createElement("button");b.className="persona";
    b.innerHTML=`<span class="av" style="background:${personColor(u.personId)}">${esc(u.displayName[0])}</span>
    <span><b>${esc(u.displayName)}</b><span>${cids.length} circle${cids.length!==1?"s":""} · ${cids.map(c=>DataAPI.get("circles",c).name).join(", ")}</span></span>`;
    b.onclick=()=>{[...list.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");sel=u;$("#loginBtn").disabled=false;};
    list.appendChild(b);
  });
  Motion.reveal("#login .panel");
  $("#loginBtn").onclick=()=>{
    if(!sel)return;
    const pin=$("#pinFld").value.trim();
    const savedPin=String(sel.pin??"").trim();
    if(savedPin&&pin!==savedPin)return Toast.show("Wrong PIN");
    finishLogin(sel);
  };
}
function enterShell(){
  $("#shell").classList.remove("hide");
  Theme.apply();switchTab("today");
  Motion.stagger("#topbar, #nav");
}
async function boot(){
  await DB.load();Theme.apply();Scene.init();AppHost.init();
  const has=Session.restore();
  /* splash preview line */
  if(has){
    const ag=Cal.agendaToday(S.circleId);
    const nx=ag.find(a=>mins(a.end)>new Date().getHours()*60+new Date().getMinutes());
    $("#splashPv").textContent=circle().name+" · "+ag.length+" today"+(nx?" · next: "+nx.title+" "+fmtT(nx.start):"");
  }else $("#splashPv").textContent=DB.error?"Live Sheets unavailable":"Private circles for family & friends";
  if(Motion.ok()){
    gsap.fromTo("#splash .logo",{opacity:0,y:18,filter:"blur(8px)"},{opacity:1,y:0,filter:"blur(0px)",duration:.7,ease:"power3.out"});
    gsap.fromTo("#splash .tag,#splash .pv",{opacity:0},{opacity:1,duration:.6,delay:.35,stagger:.15});
  }
  setTimeout(()=>{
    const sp=$("#splash");
    const done=()=>{sp.style.display="none";has?enterShell():showLogin();};
    if(Motion.ok())gsap.to(sp,{opacity:0,duration:.45,ease:"power2.in",onComplete:done});else done();
  },has?1300:1500);
  /* refresh listeners */
  ["calendar:eventCreated","calendar:routineCreated","circle:changed","app:installed"].forEach(e=>EventBus.on(e,()=>{if(S.tab==="today")renderToday();}));
  $$("#nav button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  matchMedia("(prefers-color-scheme: light)").addEventListener("change",()=>Theme.apply());
  if("serviceWorker"in navigator&&location.protocol.startsWith("http")){try{navigator.serviceWorker.register("PWA_SW.js")}catch(e){}}
}
boot();
